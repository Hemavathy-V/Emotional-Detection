<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Detector AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    /* Particle canvas */
    #canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    /* Layout */
    .container {
      position: relative;
      z-index: 1;
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* Header */
    header { text-align: center; margin-bottom: 40px; }

    .title {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      background: linear-gradient(90deg, #FF6B6B, #FFA502, #4ECDC4, #74B9FF);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 4s ease infinite;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 0.95rem;
      letter-spacing: 0.5px;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 20px;
    }

    /* Textarea */
    textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.65;
      padding: 16px;
      resize: none;
      height: 140px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    textarea::placeholder { color: rgba(255,255,255,0.25); }

    textarea:focus {
      border-color: rgba(78,205,196,0.65);
      box-shadow: 0 0 0 3px rgba(78,205,196,0.12);
    }

    .char-count {
      text-align: right;
      font-size: 0.73rem;
      color: rgba(255,255,255,0.28);
      margin-top: 6px;
    }

    /* Analyze button */
    .btn-analyze {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 18px auto 0;
      padding: 15px;
      background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 28px rgba(255,107,107,0.28);
    }

    .btn-analyze:hover  { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(255,107,107,0.45); }
    .btn-analyze:active { transform: translateY(0); }
    .btn-analyze:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* Loader */
    .loader { display: none; text-align: center; padding: 14px 0; color: rgba(255,255,255,0.45); font-size: 0.88rem; }
    .loader.active { display: block; }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4ECDC4;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-msg {
      display: none;
      background: rgba(255,71,87,0.12);
      border: 1px solid rgba(255,71,87,0.3);
      border-radius: 12px;
      padding: 11px 16px;
      color: #FF4757;
      font-size: 0.88rem;
      text-align: center;
      margin-top: 14px;
    }
    .error-msg.active { display: block; }

    /* Results grid */
    .results-grid {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
      animation: slideUp 0.45s ease-out;
    }
    .results-grid.active { display: grid; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 580px) { .results-grid { grid-template-columns: 1fr; } }

    /* Emotion card */
    .emotion-card { text-align: center; padding: 38px 20px; }

    .emotion-emoji {
      font-size: 90px;
      line-height: 1;
      display: block;
      margin-bottom: 18px;
      animation: float 2.5s ease-in-out infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(0); }
      to   { transform: translateY(-12px); }
    }

    .emotion-name {
      font-size: 1.9rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 8px;
    }

    .emotion-conf { color: rgba(255,255,255,0.5); font-size: 0.92rem; }
    .emotion-conf strong { color: rgba(255,255,255,0.85); }

    /* Score bars */
    .scores-card { padding: 26px; }

    .section-tag {
      font-size: 0.70rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-bottom: 18px;
    }

    .score-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 11px 0;
      transition: opacity 0.3s;
    }
    .score-row.dim { opacity: 0.35; }

    .score-label {
      width: 112px;
      font-size: 0.84rem;
      font-weight: 500;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      height: 10px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 20px;
      width: 0;
      transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .score-pct {
      width: 46px;
      text-align: right;
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    /* History */
    .history-section { display: none; }
    .history-section.active { display: block; }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .btn-clear {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      color: rgba(255,255,255,0.40);
      font-family: 'Inter', sans-serif;
      font-size: 0.73rem;
      cursor: pointer;
      padding: 5px 12px;
      transition: background 0.2s, color 0.2s;
    }
    .btn-clear:hover { background: rgba(255,255,255,0.10); color: rgba(255,255,255,0.7); }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 13px 16px;
      margin: 8px 0;
      border-left: 4px solid;
      animation: slideUp 0.3s ease-out;
    }

    .history-snippet {
      flex: 1;
      color: rgba(255,255,255,0.68);
      font-size: 0.87rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-badge { font-size: 0.82rem; font-weight: 700; white-space: nowrap; }
    .history-time  { font-size: 0.71rem; color: rgba(255,255,255,0.26); white-space: nowrap; }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 40px;
      color: rgba(255,255,255,0.2);
      font-size: 0.78rem;
    }

    kbd {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">

  <!-- Header -->
  <header>
    <h1 class="title">🎭 Emotion Detector AI</h1>
    <p class="subtitle">Powered by DistilRoBERTa &nbsp;·&nbsp; 7 Emotions &nbsp;·&nbsp; Real-Time Analysis</p>
  </header>

  <!-- Input -->
  <div class="card">
    <textarea
      id="textInput"
      placeholder="Type or paste your text here…&#10;e.g. 'I can't believe how amazing today turned out!'"
      maxlength="1000"
    ></textarea>
    <div class="char-count"><span id="charCount">0</span> / 1000</div>
    <button class="btn-analyze" id="analyzeBtn" onclick="analyzeText()">✨ &nbsp;Analyze Emotion</button>
    <div class="loader" id="loader"><span class="spinner"></span>Analyzing your text…</div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Results -->
  <div class="results-grid" id="resultsGrid">

    <div class="card emotion-card" id="emotionCard">
      <span class="emotion-emoji" id="resultEmoji"></span>
      <div class="emotion-name" id="resultName"></div>
      <div class="emotion-conf" id="resultConf"></div>
    </div>

    <div class="card scores-card">
      <div class="section-tag">All Emotion Scores</div>
      <div id="scoreBars"></div>
    </div>

  </div>

  <!-- History -->
  <div class="card history-section" id="historySection">
    <div class="history-header">
      <div class="section-tag">📋 &nbsp;Recent Analyses</div>
      <button class="btn-clear" onclick="clearHistory()">Clear</button>
    </div>
    <div id="historyList"></div>
  </div>

  <footer>Press <kbd>Ctrl + Enter</kbd> to analyze</footer>

</div>

<script>
  const EMOTIONS = {
    anger:    { emoji: '😠', color: '#FF4757' },
    disgust:  { emoji: '🤢', color: '#2ED573' },
    fear:     { emoji: '😨', color: '#A29BFE' },
    joy:      { emoji: '😄', color: '#FFA502' },
    neutral:  { emoji: '😐', color: '#B2BEC3' },
    sadness:  { emoji: '😢', color: '#74B9FF' },
    surprise: { emoji: '😲', color: '#FD9644' },
  };

  let history = JSON.parse(localStorage.getItem('emotionHistory') || '[]');

  /* Character counter */
  document.getElementById('textInput').addEventListener('input', function () {
    document.getElementById('charCount').textContent = this.value.length;
  });

  /* Ctrl+Enter shortcut */
  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyzeText();
  });

  /* Main analyze function */
  async function analyzeText() {
    const text = document.getElementById('textInput').value.trim();
    if (!text) { showError('Please enter some text before analyzing.'); return; }

    setLoading(true);
    hideError();

    try {
      const res  = await fetch('/analyze', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ text }),
      });
      const data = await res.json();

      if (!res.ok) { showError(data.error || 'Something went wrong.'); return; }

      showResult(data);
      addToHistory(text, data);

    } catch {
      showError('Cannot reach the server. Make sure app.py is running on port 5000.');
    } finally {
      setLoading(false);
    }
  }

  /* Render result */
  function showResult({ emotion, confidence, scores }) {
    const meta = EMOTIONS[emotion] || { emoji: '❓', color: '#95A5A6' };

    document.getElementById('resultEmoji').textContent       = meta.emoji;
    document.getElementById('resultName').textContent        = emotion.toUpperCase();
    document.getElementById('resultName').style.color        = meta.color;
    document.getElementById('resultConf').innerHTML          = `Confidence: <strong>${confidence.toFixed(1)}%</strong>`;
    document.getElementById('emotionCard').style.borderColor = meta.color + '44';

    /* Score bars */
    const barsEl = document.getElementById('scoreBars');
    barsEl.innerHTML = '';
    Object.entries(scores)
      .sort((a, b) => b[1] - a[1])
      .forEach(([em, score]) => {
        const m   = EMOTIONS[em] || { emoji: '❓', color: '#95A5A6' };
        const row = document.createElement('div');
        row.className = 'score-row' + (em !== emotion ? ' dim' : '');
        row.innerHTML = `
          <div class="score-label">${m.emoji} ${cap(em)}</div>
          <div class="bar-track"><div class="bar-fill" id="bar-${em}" style="background:${m.color};"></div></div>
          <div class="score-pct">${score.toFixed(1)}%</div>`;
        barsEl.appendChild(row);
      });

    document.getElementById('resultsGrid').classList.add('active');

    /* Animate bars after a tick so CSS transition fires */
    setTimeout(() => {
      Object.entries(scores).forEach(([em, score]) => {
        const el = document.getElementById(`bar-${em}`);
        if (el) el.style.width = score + '%';
      });
    }, 60);
  }

  /* History */
  function addToHistory(text, { emotion, confidence }) {
    history.unshift({
      text, emotion, confidence,
      time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
    });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem('emotionHistory', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('historySection');
    const list    = document.getElementById('historyList');

    if (!history.length) { section.classList.remove('active'); return; }

    section.classList.add('active');
    list.innerHTML = '';
    history.forEach(item => {
      const meta    = EMOTIONS[item.emotion] || { emoji: '❓', color: '#95A5A6' };
      const snippet = item.text.length > 68 ? item.text.slice(0, 68) + '…' : item.text;
      const el      = document.createElement('div');
      el.className  = 'history-item';
      el.style.borderLeftColor = meta.color;
      el.innerHTML  = `
        <div class="history-snippet">"${esc(snippet)}"</div>
        <div class="history-badge" style="color:${meta.color};">${meta.emoji} ${cap(item.emotion)}</div>
        <div class="history-time">${item.time}</div>`;
      list.appendChild(el);
    });
  }

  function clearHistory() {
    history = [];
    localStorage.removeItem('emotionHistory');
    renderHistory();
  }

  /* UI helpers */
  function setLoading(on) {
    document.getElementById('loader').classList.toggle('active', on);
    document.getElementById('analyzeBtn').disabled = on;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠️  ' + msg;
    el.classList.add('active');
  }

  function hideError() { document.getElementById('errorMsg').classList.remove('active'); }
  function cap(s)      { return s.charAt(0).toUpperCase() + s.slice(1); }
  function esc(s)      { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* Particle background */
  (function () {
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    let   pts    = [];

    function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    function Pt() { this.reset(); }
    Pt.prototype.reset = function () {
      this.x  = Math.random() * canvas.width;
      this.y  = Math.random() * canvas.height;
      this.r  = Math.random() * 1.8 + 0.4;
      this.vx = (Math.random() - 0.5) * 0.28;
      this.vy = (Math.random() - 0.5) * 0.28;
      this.a  = Math.random() * 0.45 + 0.1;
    };
    Pt.prototype.tick = function () {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      ctx.save();
      ctx.globalAlpha = this.a;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.restore();
    };

    for (let i = 0; i < 90; i++) pts.push(new Pt());

    (function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pts.forEach(p => p.tick());
      requestAnimationFrame(loop);
    })();
  })();

  /* Load existing history on startup */
  renderHistory();
</script>
</body>
</html>
